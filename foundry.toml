[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
]
evm_version = "cancun"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
# NOTE: These compiler settings MUST be reused during ApeScan verification:
# - solc_version = 0.8.24
# - evm_version = cancun
# - optimizer = true
# - optimizer_runs = 200
# - via_ir = false
ignore = ["lib/**"]
fs_permissions = [
    { access = "read", path = "docs/stabilization_script/sim/items/output/" },
    { access = "read", path = "assets/items/" }
]


